name: C Parser CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Compile parser
        run: gcc -Wall -Wextra -std=c11 parser.c -o parser

      - name: Test committed inputfile.txt
        run: |
          set +e
          output=$(./parser inputfile.txt)
          status=$?
          set -e

          test "$status" -ne 0
          echo "$output" | grep -q "Semantic Error: Variable redeclared"

